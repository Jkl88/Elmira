; Elmira — электронный замок (ESP32-C3, Arduino, TKWifiManager)
; См. .apprules и README.md

[env:esp32-c3-devkitm-1]
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino

; Раздел под LittleFS (TKWifiManager и веб-страницы)
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

lib_deps     =
    https://github.com/Jkl88/TKWifiManager.git
    links2004/WebSockets @ ^2.4.1
    https://github.com/adafruit/Adafruit_AS5600.git
    adafruit/Adafruit BusIO @ ^1.14.0
    bblanchon/ArduinoJson @ ^6.21.0
    arduino-libraries/Servo @ ^1.2.0

build_flags  =
    -DTKWM_USE_LITTLEFS=1
    -DCORE_DEBUG_LEVEL=1

monitor_speed = 115200
upload_speed  = 921600

; Загрузка FS: pio run -t uploadfs (файлы из data/ в LittleFS)
